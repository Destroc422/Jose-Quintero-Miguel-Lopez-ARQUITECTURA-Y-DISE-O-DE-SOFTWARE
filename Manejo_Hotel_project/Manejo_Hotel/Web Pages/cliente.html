<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Panel del Cliente</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

  <div class="container mt-4">
    <h2>Área del Cliente</h2>
    <p class="text-muted">Bienvenido. Aquí tienes tus opciones.</p>

    <ul class="list-group mb-3">
      <li class="list-group-item">Consultar disponibilidad</li>
      <li class="list-group-item">Realizar reserva</li>
      <li class="list-group-item">Ver mis reservas</li>
    </ul>

    <button class="btn btn-danger" onclick="logout()">Cerrar sesión</button>
  </div>

  <script>
    fetch('CheckRoleServlet').then(r=>r.text()).then(role=>{
      if(role.trim() !== 'cliente'){
        window.location.href = 'login.html';
      }
    }).catch(()=>{ window.location.href='login.html'; });

    function logout(){
      fetch('LogoutServlet').then(()=> window.location.href='login.html');
    }
  </script>

</body>
</html>
