<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login - Hotel</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

  <div class="container" style="max-width:420px; padding-top:80px;">
    <h2 class="text-center mb-4">Iniciar Sesión</h2>
    <div class="card p-4 shadow-sm">

      <form id="formLogin" method="post" action="LoginServlet">
        <div class="mb-3">
          <label class="form-label">Usuario</label>
          <input name="usuario" id="loginUser" class="form-control" required>
        </div>

        <div class="mb-3">
          <label class="form-label">Contraseña</label>
          <input name="clave" id="loginPass" type="password" class="form-control" required>
        </div>

        <button class="btn btn-primary w-100">Entrar</button>
      </form>

    </div>
  </div>

</body>
</html>
